<mat-sidenav-container class="app-shell">
  <mat-sidenav
    #sidenav
    class="app-sidebar"
    [ngClass]="{'sidebar-collapsed': !isOpened}"
    mode="side"
    opened="true"
  >
    <div class="sidebar-content">
    <div class="sidebar-header" [matTooltip]="(churchName$ | async) ?? 'Igreja'" matTooltipPosition="right" [matTooltipDisabled]="isOpened">
      <div class="brand-icon">
        <mat-icon>church</mat-icon>
      </div>
      <div class="brand-text">
        <strong>{{ churchName$ | async }}</strong>
        <span>Sistema de Gestão</span>
        <span class="church-id">ID: {{ churchId }}</span>
      </div>
    </div>

    <div class="sidebar-label">Navegacao</div>

    <nav class="sidebar-nav">
      <a class="sidebar-item" [routerLink]="tenantLink('home')" routerLinkActive="active-item" matTooltip="Dashboard" matTooltipPosition="right" [matTooltipDisabled]="isOpened">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a class="sidebar-item" [routerLink]="tenantLink('members')" routerLinkActive="active-item" matTooltip="Membros" matTooltipPosition="right" [matTooltipDisabled]="isOpened">
        <mat-icon>group</mat-icon>
        <span>Membros</span>
      </a>
      <a class="sidebar-item" [routerLink]="tenantLink('finance')" routerLinkActive="active-item" matTooltip="Financeiro" matTooltipPosition="right" [matTooltipDisabled]="isOpened">
        <mat-icon>attach_money</mat-icon>
        <span>Financeiro</span>
      </a>
      <a class="sidebar-item" [routerLink]="tenantLink('visitors')" routerLinkActive="active-item" matTooltip="Escola Biblica" matTooltipPosition="right" [matTooltipDisabled]="isOpened">
        <mat-icon>menu_book</mat-icon>
        <span>Escola Biblica</span>
      </a>
      <div class="sidebar-item disabled-item" matTooltip="Relatorios (em breve)" matTooltipPosition="right" [matTooltipDisabled]="isOpened">
        <mat-icon>description</mat-icon>
        <span>Relatorios</span>
      </div>
    </nav>

    <div class="sidebar-footer">v1.0 - Prototipo</div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <header class="topbar">
      <button mat-icon-button class="menu-button" (click)="toggleSidenav()">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="page-title">
        <mat-icon>dashboard_customize</mat-icon>
        <h1>{{ pageTitle }}</h1>
        <span class="tenant-chip">{{ churchId }}</span>
      </div>

      <div class="topbar-actions">
        <button
          mat-icon-button
          class="action-button"
          matBadge="3"
          matBadgeSize="small"
          matBadgeColor="warn"
          matBadgeOverlap="true"
        >
          <mat-icon>notifications_none</mat-icon>
        </button>

        <button mat-icon-button class="avatar-button" [matMenuTriggerFor]="menu">
          AD
        </button>

        <mat-menu #menu="matMenu">
          <button mat-menu-item>
            <mat-icon>person</mat-icon>
            <span>Perfil</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sair</span>
          </button>
        </mat-menu>
      </div>
    </header>

    <main class="content-wrapper">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
